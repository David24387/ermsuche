<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wimmelbild – Sicherheitsrisiken</title>
<style>
  body { font-family: Arial; text-align: center; background:#f4f4f4; }
  #container { position: relative; display: inline-block; }
  img { max-width: 100%; height: auto; }
  .hitbox {
    position: absolute;
    border-radius: 6px;
  }
  .correct {
    background-color: rgba(255,0,0,0.4);
    border: 2px solid red;
  }
</style>
</head>
<body>

<h2>Finde die Sicherheitsrisiken 🔍</h2>
<p>Klicke auf die Gefahren im Bild</p>

<div id="container">
  <img src="ChatGPT Image 13. Apr. 2026, 08_20_32.png" alt="Werkstatt Bild">

  <!-- Beispiele Hitboxen (Positionen ggf. anpassen!) -->
  <div class="hitbox" style="top:70%; left:20%; width:100px; height:80px;" data-correct="true"></div>
  <div class="hitbox" style="top:60%; left:40%; width:120px; height:100px;" data-correct="true"></div>
  <div class="hitbox" style="top:75%; left:60%; width:90px; height:70px;" data-correct="true"></div>
  <div class="hitbox" style="top:40%; left:10%; width:100px; height:120px;" data-correct="true"></div>

</div>

<script>
  document.querySelectorAll('.hitbox').forEach(box => {
    box.addEventListener('click', function() {
      if (this.dataset.correct === "true") {
        this.classList.add('correct');
      }
    });
  });
</script>

</body>
</html>
